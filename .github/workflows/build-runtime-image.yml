name: build-runtime-image

# Builds and pushes the per-tenant multitenant runtime image to GHCR.
# Triggered on changes to anything that affects the image, and manually.
#
# Two jobs:
#   1. build         — buildx + push to ghcr.io/saml212/rockielab-runtime-multitenant:{sha,latest}
#   2. dispatch-deploy — optional cross-repo trigger of deploy-hetzner.yml
#                        (skipped silently if PLATFORM_CONTEXT_DISPATCH_TOKEN
#                        isn't set on this repo).
#
# Dockerfile.multitenant uses `COPY --from=skills` which expects a
# named build-context. We vendor saml212/platform-skills (a private
# sibling repo) into the runner before building.
#
# Required CI secrets (set in saml212/platform-runtime Actions secrets):
#   - GHCR_TOKEN  (classic PAT with write:packages, read:packages)
#   - PLATFORM_SKILLS_READ_TOKEN  (fine-grained PAT with Contents:Read on
#     saml212/platform-skills only. Required because platform-skills is
#     private and the default GITHUB_TOKEN is scoped to this repo only.)
#
# Optional CI secrets:
#   - PLATFORM_CONTEXT_DISPATCH_TOKEN  (PAT with `actions:write` on
#     saml212/platform-context). Lets a successful build automatically
#     trigger the Hetzner deploy. Skip if you'd rather click the deploy
#     manually after a build.

on:
  push:
    branches: [main]
    # Only rebuild when paths that affect the runtime image actually change.
    # Skipping image-irrelevant paths (docs, top-level READMEs, agent prompts)
    # cuts ~30 min of useless build time per unrelated push.
    paths:
      - "Dockerfile.multitenant"
      - "overlay/multitenant/**"
      - "apps/broker/**"
      - "pyproject.toml"
      - "uv.lock"
      - "package.json"
      - "bun.lockb"
      - "pnpm-lock.yaml"
      - "requirements*.txt"
      - ".github/workflows/build-runtime-image.yml"
  workflow_dispatch: {}
  repository_dispatch:
    # Fired by saml212/platform-skills when its `main` updates, so the
    # baked-in skills overlay gets a fresh build. The dispatcher
    # workflow lives on platform-skills (TODO if it doesn't exist yet).
    types: [skills-updated]

concurrency:
  group: build-runtime-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/saml212/rockielab-runtime-multitenant
      # Map the secret to env so we can `if:` on it (secrets context is
      # not available in step-level if expressions; env is).
      SKILLS_READ_TOKEN: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
    steps:
      - name: Preflight — require PLATFORM_SKILLS_READ_TOKEN
        if: env.SKILLS_READ_TOKEN == ''
        run: |
          echo "::error::PLATFORM_SKILLS_READ_TOKEN secret is not set on this repo."
          echo "Generate a fine-grained PAT with Contents:Read on saml212/platform-skills,"
          echo "then: gh secret set PLATFORM_SKILLS_READ_TOKEN --repo saml212/platform-runtime --body '<pat>'"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout platform-skills (vendored at build time)
        uses: actions/checkout@v4
        with:
          repository: saml212/platform-skills
          path: vendor/platform-skills
          token: ${{ secrets.PLATFORM_SKILLS_READ_TOKEN }}
          fetch-depth: 1

      - name: Free up runner disk
        run: |
          # GH default runners come with caches/SDKs we don't need for this build.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: saml212
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multitenant
          # Dockerfile.multitenant has `COPY --from=skills .` which
          # resolves via this named build-context, fed from the
          # vendored checkout above.
          build-contexts: |
            skills=vendor/platform-skills
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "## Pushed runtime image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Set \`ROCKIELAB_RUNTIME_IMAGE=${{ env.IMAGE }}:${{ github.sha }}\` in platform-context's Hetzner .env to roll forward." >> $GITHUB_STEP_SUMMARY

  dispatch-deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Map the secret to a job-level env var. We can't reference `secrets.*`
    # in `if:` expressions (job- or step-level), but we CAN reference
    # `env.*`. So we read the secret into env at job startup, then gate
    # the step on env. If the secret is unset, env is empty and the
    # step skips silently.
    env:
      DISPATCH_TOKEN: ${{ secrets.PLATFORM_CONTEXT_DISPATCH_TOKEN }}
    steps:
      - name: Trigger platform-context deploy-hetzner
        if: env.DISPATCH_TOKEN != ''
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/saml212/platform-context/actions/workflows/deploy-hetzner.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Note when skipped
        if: env.DISPATCH_TOKEN == ''
        run: |
          echo "## Cross-repo deploy NOT triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PLATFORM_CONTEXT_DISPATCH_TOKEN is not set on this repo, so the Hetzner deploy was not auto-triggered. Click 'Run workflow' manually on saml212/platform-context's deploy-hetzner.yml when ready." >> $GITHUB_STEP_SUMMARY
